name: Release

on:
  push:
    branches:
      - main
      - feat/*
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'rsrc/**'
      - 'Info.plist'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows resources
        run: go-winres make

      - name: Build
        run: go build -ldflags="-H windowsgui" -o prism.exe .

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: prism-exe
          path: prism.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: prism.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=1 go build -o prism .

      - name: Package .app bundle
        run: |
          mkdir -p Prism.app/Contents/MacOS
          mkdir -p Prism.app/Contents/Resources
          cp prism Prism.app/Contents/MacOS/prism
          cp Info.plist Prism.app/Contents/Info.plist

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Prism-app
          path: Prism.app

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: Prism.app